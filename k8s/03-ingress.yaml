---
# DEV Ingress (optional, path-based routing)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-app-ingress
  namespace: chat-dev
  labels:
    app: chat-app
    env: dev
spec:
  ingressClassName: nginx
  rules:
  - host: chat-dev.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chat-app-service
            port:
              number: 80

---
# PRE-PROD Ingress (subdomain-based routing)
apiVersion: networking.k8s.io/v1
kind: Ingress
